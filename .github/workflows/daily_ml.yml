name: Daily ML Processing

on:
  schedule:
    - cron: "0 4 * * *"    # 04:00 UTC — nach dem Crawl
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ml_processing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore DB from cache
        uses: actions/cache@v4
        with:
          path: data/news.db
          key: news-db-${{ github.run_id }}
          restore-keys: |
            news-db-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install sentence-transformers scikit-learn numpy germansentiment "transformers==4.40.0" torch requests python-dotenv groq fastapi

      - name: Fix word counts
        continue-on-error: true
        run: |
          python crew/tools/fix_word_count.py

      - name: Save DB to cache (after fix)
        uses: actions/cache/save@v4
        with:
          path: data/news.db
          key: news-db-${{ github.run_id }}-fix

      - name: Compute embeddings
        run: |
          python crew/tools/embed_articles.py

      - name: Save DB to cache (after embeddings)
        uses: actions/cache/save@v4
        with:
          path: data/news.db
          key: news-db-${{ github.run_id }}-embeddings

      - name: Compute sentiment + emotions
        run: |
          python crew/tools/sentiment_analyzer.py

      - name: Save DB to cache (after sentiment)
        uses: actions/cache/save@v4
        with:
          path: data/news.db
          key: news-db-${{ github.run_id }}-sentiment

      - name: Compute Medienspiegel analysis
        continue-on-error: true
        env:
          LLM_PROVIDER: groq
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python crew/tools/bridging_scorer.py --all

      - name: Save DB to cache (after bridging)
        uses: actions/cache/save@v4
        with:
          path: data/news.db
          key: news-db-${{ github.run_id }}-bridging

      - name: Export analytics to JSON
        continue-on-error: true
        run: |
          python crew/tools/export_analytics.py

      - name: Save DB to cache (final)
        uses: actions/cache/save@v4
        with:
          path: data/news.db
          key: news-db-${{ github.run_id }}

      - name: Commit results
        run: |
          git config --global user.name "consensus-agent-bot"
          git config --global user.email "bot@consensus-agent"
          git stash --include-untracked
          git pull origin main --rebase
          git stash pop || true
          git add data/results/
          git diff --staged --quiet || git commit -m "chore: daily ML processing + analytics export $(date -u '+%Y-%m-%d')"
          git push