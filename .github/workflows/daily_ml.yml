name: Daily ML Processing

on:
  schedule:
    - cron: "0 4 * * */3"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ml_processing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install sentence-transformers scikit-learn numpy germansentiment "transformers==4.40.0" torch requests python-dotenv groq fastapi pytrends psycopg2-binary pgvector anthropic

      - name: Compute embeddings
        env:
          RAILWAY_DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
        run: |
          python crew/tools/media/clusterer.py

      - name: Compute sentiment + emotions
        env:
          RAILWAY_DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
        run: |
          python crew/tools/media/sentiment_analyzer.py

      - name: Compute Medienspiegel analysis
        continue-on-error: true
        env:
          RAILWAY_DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
          LLM_PROVIDER: groq
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python crew/tools/media/bridging_scorer.py --all

      - name: Export analytics to JSON
        continue-on-error: true
        env:
          RAILWAY_DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
          LLM_PROVIDER: groq
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python crew/tools/media/export_analytics.py

      - name: Commit results
        run: |
          git config --global user.name "consensus-agent-bot"
          git config --global user.email "bot@consensus-agent"
          git stash --include-untracked
          git pull origin main --rebase
          git stash pop || true
          git add data/results/
          git diff --staged --quiet || git commit -m "chore: daily ML processing + analytics export $(date -u '+%Y-%m-%d')"
          git push
