name: Daily RSS Crawl

on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 12 * * *"
    - cron: "0 18 * * *"
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore DB from cache
        uses: actions/cache@v4
        with:
          path: data/news.db
          key: news-db-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            news-db-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests python-dotenv

      - name: Run RSS crawler
        run: |
          python crew/tools/media/rss_crawler.py

      - name: Save DB to cache
        uses: actions/cache@v4
        with:
          path: data/news.db
          key: news-db-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload DB artifact
        uses: actions/upload-artifact@v4
        with:
          name: news-db-latest
          path: data/news.db
          retention-days: 1

      - name: Commit crawl summary
        run: |
          git config --global user.name "consensus-agent-bot"
          git config --global user.email "bot@consensus-agent"
          git add data/last_crawl.json
          git diff --staged --quiet || git commit -m "chore: RSS crawl $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
