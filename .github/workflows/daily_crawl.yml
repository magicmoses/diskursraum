name: Daily RSS Crawl

on:
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 3 * * *"
    - cron: "0 6 * * *"
    - cron: "0 9 * * *"
    - cron: "0 12 * * *"
    - cron: "0 15 * * *"
    - cron: "0 18 * * *"
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests python-dotenv

      - name: Run RSS crawler
        run: |
          python crew/tools/rss_crawler.py

      - name: Commit new articles to repo
        run: |
          git config --global user.name "consensus-agent-bot"
          git config --global user.email "bot@consensus-agent"
          git add data/news.db data/last_crawl.json
          git diff --staged --quiet || git commit -m "chore: RSS crawl $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
      
            - name: Install full dependencies for agents
        run: |
          pip install requests python-dotenv crewai litellm

      - name: Run Topic Discovery Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LLM_PROVIDER: groq
        run: |
          python crew/agents/topic_discovery_agent.py