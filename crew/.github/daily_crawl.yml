name: Daily RSS Crawl

on:
  schedule:
    - cron: "0 0 * * *"    # 00:00 UTC
    - cron: "0 3 * * *"    # 03:00 UTC
    - cron: "0 6 * * *"    # 06:00 UTC
    - cron: "0 9 * * *"    # 09:00 UTC
    - cron: "0 12 * * *"   # 12:00 UTC
    - cron: "0 15 * * *"   # 15:00 UTC
    - cron: "0 18 * * *"   # 18:00 UTC
    - cron: "0 21 * * *"   # 21:00 UTC
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests python-dotenv

      - name: Run RSS crawler
        run: |
          python crew/tools/rss_crawler.py

      - name: Commit new articles to repo
        run: |
          git config --global user.name "consensus-agent-bot"
          git config --global user.email "bot@consensus-agent"
          git add data/news.db data/last_crawl.json
          git diff --staged --quiet || git commit -m "chore: RSS crawl $(date -u '+%Y-%m-%d %H:%M UTC') — $(python -c "import json; d=json.load(open('data/last_crawl.json')); print(str(d['total_new'])+' new articles')")"
          git push