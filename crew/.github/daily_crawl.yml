name: Daily RSS Crawl

on:
  schedule:
    - cron: "0 6 * * *"   # Every day at 06:00 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests python-dotenv

      - name: Run RSS crawler
        run: |
          python crew/tools/rss_crawler.py

      - name: Commit new articles to repo
        run: |
          git config --global user.name "consensus-agent-bot"
          git config --global user.email "bot@consensus-agent"
          git add data/news.db data/last_crawl.json
          git diff --staged --quiet || git commit -m "chore: daily RSS crawl $(date -u '+%Y-%m-%d')"
          git push